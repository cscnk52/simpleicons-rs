name: 🦀 Publish Crate

on:
  schedule:
    - cron: "0 * * * 0"
    - cron: "0 0 * * 1,4"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.version-check.outputs.updated }}
      version: ${{ steps.version-check.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - run: cargo run
        id: version-check

  publish:
    needs: [check]
    if: needs.check.outputs.updated == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: build/crates
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - run: cargo run
        working-directory: ${{ github.workspace }}

      - run: cargo test

      - uses: stefanzweifel/git-auto-commit-action@28e16e81777b558cc906c8750092100bbb34c5e3 # v7.0.0
        id: commit
        with:
          branch: main
          file_pattern: build/crates/Cargo.toml
          commit_message: "chore(release): bump simpleicons-rs to ${{ needs.check.outputs.version }}"
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          commit: ${{ steps.commit.outputs.commit_hash}}
          tag: v${{ needs.check.outputs.version }}
          name: simpleicons-rs@v${{ needs.check.outputs.version }}
          body: Update to [simple-icons ${{ needs.check.outputs.version }}](https://github.com/simple-icons/simple-icons/releases/tag/${{ needs.check.outputs.version }})
          immutableCreate: true

      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
